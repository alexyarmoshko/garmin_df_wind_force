name = "wind-force-proxy"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "FORECAST_CACHE"
id = "e767f9f63ec641e197973ea9cec58e1b"

# To use a custom domain, either:
# 1. Add kayakshaver.com as a proxied zone in Cloudflare, then uncomment:
#    [[routes]]
#    pattern = "api.kayakshaver.com/*"
#    zone_name = "kayakshaver.com"
# 2. Or add a Custom Domain via the Cloudflare dashboard after deploying.
#
# Without routes, the Worker deploys to:
#   https://wind-force-proxy.<your-account>.workers.dev
